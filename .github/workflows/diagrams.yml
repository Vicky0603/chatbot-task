name: Generate diagrams

on:
  push:
    branches: [ main, master ]
    paths:
      - 'doc/*.mmd'
      - '.github/workflows/diagrams.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli@10

      - name: Render component diagram
        run: |
          if [ -f doc/component-diagram.mmd ]; then
            mmdc -i doc/component-diagram.mmd -o doc/Component-Diagram.png
          fi

      - name: Render sequence diagram
        run: |
          if [ -f doc/sequence-diagram.mmd ]; then
            mmdc -i doc/sequence-diagram.mmd -o doc/Sequence-Diagram.png
          fi

      - name: Commit diagrams if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(diagrams): auto-generate PNGs from Mermaid sources"
          file_pattern: doc/Component-Diagram.png doc/Sequence-Diagram.png
